<!DOCTYPE html>
<html lang="es" style="overflow-x:hidden;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Cuántos clientes estás perdiendo? — Lidera tu Negocio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a0f2e; --surface:#221442; --surface2:#2d1a52;
  --accent:#ee46bc; --accent3:#3e2b86;
  --success:#22d3a3; --warning:#f59e0b; --danger:#f43f5e;
  --text:#ffffff; --text-muted:#d8cce8;
  --border:rgba(238,70,188,.15); --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;max-width:100%;}
body{
  background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 60px;position:relative;
  max-width:100vw;font-size:16px;
}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:60%;
  background:radial-gradient(ellipse,rgba(238,70,188,.09) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;
  background:radial-gradient(ellipse,rgba(62,43,134,.2) 0%,transparent 70%);pointer-events:none;z-index:0;}
#app{width:100%;max-width:660px;position:relative;z-index:1;}

.hdr{text-align:center;margin-bottom:30px;animation:fadeDown .6s ease both;}
.logo{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;}
.logo::before,.logo::after{content:'';display:block;width:28px;height:1px;background:var(--accent);opacity:.5;}
h1{font-size:clamp(22px,5vw,34px);font-weight:800;line-height:1.18;letter-spacing:-.02em;margin-bottom:10px;}
h1 span{color:var(--accent);}
.subtitle{font-size:16px;color:#e8e0f5;line-height:1.65;font-weight:300;max-width:460px;margin:0 auto;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:fadeUp .5s ease .1s both;}
.prog{height:3px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));
  border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.body{padding:22px 20px;}
.foot{padding:14px 16px 22px;border-top:1px solid var(--border);background:var(--surface);}

.badge{display:inline-flex;align-items:center;gap:6px;
  background:rgba(238,70,188,.1);border:1px solid rgba(238,70,188,.22);
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.p-icon{font-size:30px;display:block;margin-bottom:10px;}
.p-title{font-size:19px;font-weight:800;margin-bottom:6px;}
.p-desc{font-size:16px;color:#e8e0f5;line-height:1.6;margin-bottom:6px;}
.p-sub{font-size:15px;color:#e8e0f5;line-height:1.6;margin-bottom:16px;}

.where{background:rgba(62,43,134,.18);border:1px solid rgba(62,43,134,.45);
  border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.8;
  color:var(--text-muted);margin-bottom:18px;overflow-wrap:break-word;word-break:break-word;}
.where strong{color:var(--text);}
.where-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:#9b8abf;margin-bottom:9px;display:flex;align-items:center;gap:5px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text-muted);margin-bottom:7px;}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:13px 16px;border-radius:10px;font-size:15px;
  font-family:'Poppins',sans-serif;outline:none;transition:border-color .18s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--text-muted);}

.ins{border-radius:10px;padding:12px 15px;font-size:13.5px;line-height:1.6;
  margin-top:12px;animation:bubbleIn .3s ease both;display:flex;align-items:flex-start;gap:9px;}
.ins-i{flex-shrink:0;font-size:15px;margin-top:2px;}
.ins.g{background:rgba(34,211,163,.08);border:1px solid rgba(34,211,163,.25);color:#a7f3d0;}
.ins.w{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#fcd34d;}
.ins.b{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);color:#fda4af;}
.ins.i{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);}

.tip{background:rgba(62,43,134,.15);border:1px solid rgba(62,43,134,.3);
  border-radius:10px;padding:12px 15px;font-size:13px;color:var(--text-muted);
  line-height:1.65;margin-top:10px;}

.btn-row{display:flex;gap:10px;width:100%;}
.btn-s{order:2;}
.btn-p{order:1;}
.btn{padding:12px 18px;border-radius:10px;font-size:14px;font-family:'Poppins',sans-serif;
  font-weight:700;cursor:pointer;transition:all .18s ease;border:none;white-space:nowrap;}
.btn-p{background:var(--accent);color:#fff;flex:1;min-width:0;white-space:nowrap;}
.btn-p:hover{background:#f568cc;transform:translateY(-1px);}
.btn-s{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);flex-shrink:0;white-space:nowrap;}
.btn-s:hover{border-color:var(--accent);color:var(--accent);}

/* DIAGNOSTIC */
.diag-hero{
  background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(238,70,188,.08));
  border:1px solid rgba(244,63,94,.25);border-radius:14px;
  padding:22px;text-align:center;margin-bottom:20px;
}
.dh-emoji{font-size:36px;margin-bottom:8px;display:block;}
.dh-pct{font-size:54px;font-weight:800;color:var(--danger);line-height:1;}
.dh-lbl{font-size:15px;font-weight:700;margin-top:6px;}
.dh-sub{font-size:13px;color:var(--text-muted);margin-top:6px;line-height:1.6;}

.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:var(--text-muted);margin:22px 0 12px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

.funnel-row{display:grid;grid-template-columns:10px 105px 1fr 52px;
  gap:8px;align-items:center;margin-bottom:8px;}
.fdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.flbl{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.fbar-w{background:rgba(255,255,255,.05);border-radius:6px;height:22px;overflow:hidden;position:relative;}
.fbar{height:100%;border-radius:6px;position:absolute;left:0;top:0;
  transition:width .7s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px;}
.fbar span{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;}
.frate{font-size:12px;font-weight:700;text-align:right;white-space:nowrap;}
.frate.g{color:var(--success);} .frate.w{color:var(--warning);} .frate.b{color:var(--danger);}

.leak{background:var(--surface2);border:1px solid rgba(244,63,94,.2);
  border-radius:12px;padding:15px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.leak-n{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);
  border-radius:8px;padding:6px 10px;text-align:center;flex-shrink:0;min-width:48px;}
.ln-lbl{font-size:9px;color:var(--danger);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.ln-v{font-size:18px;font-weight:800;color:var(--danger);line-height:1.1;}
.lb-ttl{font-size:14px;font-weight:700;margin-bottom:3px;}
.lb-txt{font-size:13px;color:var(--text-muted);line-height:1.55;}
.lb-money{font-size:12px;color:var(--danger);font-weight:600;margin-top:5px;}

.tbl{width:100%;border-collapse:collapse;margin-bottom:6px;}
.tbl th{background:var(--surface2);padding:9px 12px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);text-align:left;}
.tbl th:last-child{text-align:right;}
.tbl td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);}
.tbl tr:last-child td{border-bottom:none;}
.tbl td:last-child{text-align:right;font-weight:700;}
.tbl .hl td{background:rgba(238,70,188,.06);}
.tbl .hl td:last-child{color:var(--accent);}
.tag-now{font-size:10px;background:rgba(255,255,255,.07);border-radius:4px;padding:2px 6px;color:var(--text-muted);margin-left:4px;}
.tag-up{font-size:10px;background:rgba(34,211,163,.12);border-radius:4px;padding:2px 6px;color:var(--success);margin-left:4px;}

.callout{background:linear-gradient(135deg,rgba(238,70,188,.1),rgba(62,43,134,.18));
  border:1px solid rgba(238,70,188,.3);border-radius:14px;padding:22px;text-align:center;margin:20px 0;}
.callout .ce{font-size:30px;margin-bottom:10px;display:block;}
.callout .ct{font-size:17px;font-weight:800;margin-bottom:8px;}
.callout .cb{font-size:14px;color:var(--text-muted);line-height:1.7;max-width:450px;margin:0 auto;}
.callout strong{color:var(--text);}

/* LEAD */
.lead-intro{font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:20px;}
.lead-intro strong{color:var(--text);}
.skip-btn{background:none;border:none;color:var(--text-muted);font-size:12px;
  font-family:'Poppins',sans-serif;cursor:pointer;text-decoration:underline;
  text-underline-offset:3px;display:block;margin:14px auto 0;text-align:center;}
.skip-btn:hover{color:var(--text);}

/* THANKS */
.thanks{text-align:center;padding:8px 0;}
.thanks .ti{font-size:46px;margin-bottom:12px;display:block;}
.thanks .tt{font-size:21px;font-weight:800;margin-bottom:8px;}
.thanks .tb{font-size:14px;color:var(--text-muted);line-height:1.7;}

.book-block{background:linear-gradient(135deg,rgba(238,70,188,.08),rgba(62,43,134,.15));
  border:1px solid rgba(238,70,188,.25);border-radius:14px;padding:22px;text-align:center;margin-top:20px;}
.book-block p{font-size:14px;color:var(--text-muted);line-height:1.65;margin-bottom:16px;}
.book-block strong{color:var(--text);}
.btn-book{display:inline-block;background:var(--accent);color:#fff;padding:14px 28px;
  border-radius:10px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;
  text-decoration:none;cursor:pointer;border:none;transition:all .18s ease;}
.btn-book:hover{background:#f568cc;transform:translateY(-2px);box-shadow:0 8px 24px rgba(238,70,188,.35);}
.btn-dl{display:inline-block;background:transparent;border:1px solid rgba(238,70,188,.4);
  color:var(--accent);padding:12px 22px;border-radius:10px;font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .18s ease;margin-top:10px;}
.btn-dl:hover{background:rgba(238,70,188,.08);}

.ai-block{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:20px;}
.ai-lbl{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.15em;color:var(--accent);margin-bottom:12px;opacity:.8;}
.ai-lbl::before{content:'✦';}
.ai-txt{font-size:13.5px;line-height:1.75;color:var(--text);}
.ai-txt strong{color:var(--accent);}
.gen{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px;padding:6px 0;}
.spin{width:14px;height:14px;border:2px solid rgba(238,70,188,.3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes bubbleIn{from{opacity:0;transform:scale(.94) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}

@media(max-width:600px){
  .funnel-row{grid-template-columns:10px 80px 1fr 42px;}
  .btn-row{flex-direction:column;}
  .btn-s{order:2;width:100%;}
  .btn-p{order:1;width:100%;font-size:16px;padding:15px;}
  .btn-s{order:2;}
  .btn-p{order:1;font-size:16px;padding:15px;}
  .body{padding:18px 16px;}
  .foot{padding:12px 16px 20px;}
  .btn-row{flex-wrap:nowrap;}
  .btn-s{font-size:13px;padding:12px 14px;}
  .btn-p{font-size:14px;padding:12px 16px;}

  /* Bigger base text on mobile */
  .p-desc, .p-sub { font-size:15px; }
  .where { font-size:14px; line-height:1.9; }
  .where strong { font-size:15px; }
  .ins { font-size:15px; }
  .tip { font-size:14px; }
  .field label { font-size:13px; }
  .inp { font-size:16px; padding:14px 16px; } /* 16px prevents iOS zoom */
  .btn { font-size:15px; padding:14px 18px; }
  .p-title { font-size:20px; }
  .badge { font-size:12px; }

  /* Diagnostic screen */
  .dh-pct { font-size:48px; }
  .dh-sub { font-size:14px; }
  .leak { flex-direction:column; gap:8px; }
  .leak-n { flex-direction:row; align-items:center; gap:8px; min-width:unset; width:fit-content; }
  .lb-txt { font-size:14px; }
  .lb-ttl { font-size:15px; }
  .tbl td, .tbl th { font-size:13px; padding:8px 10px; }
  .callout .cb { font-size:14px; }
  .callout .ct { font-size:17px; }

  /* Simulator */
  .flbl { font-size:12px; }
  #funnelSim { font-size:13px; }

  /* Lead + thanks */
  .lead-intro { font-size:15px; }
  .btn-book { font-size:15px; padding:15px 24px; }
  .ai-txt { font-size:15px; }

  /* Hero header */
  .subtitle { font-size:15px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const WEB3FORMS_KEY = '16a6c936-0dc8-4754-bd90-f72ad0f922ae';
const BOOKING_URL   = 'https://api.leadconnectorhq.com/widget/bookings/carla-sheila-ltn';
const GHL_WEBHOOK   = 'https://services.leadconnectorhq.com/hooks/qmiZ6dvbYjR4c3xw6Q9I/webhook-trigger/985e45b5-15e4-41fc-ac14-650bb84904ef';

/* ═══ FASES ═══ */
const PHASES = [
  {
    id:1, key:'leads',
    icon:'📥', name:'Leads recibidos',
    question:'¿Cuántos leads o contactos nuevos llegaron este mes?',
    desc:'Cualquier persona que mostró interés en tu servicio: rellenó un formulario, llamó, escribió por WhatsApp, fue referida por un cliente...',
    where:`
<strong>Si tienes publicidad activa (Meta/Google Ads):</strong> Abre tu panel de campañas y busca la columna "Clientes potenciales" o "Leads". Es el número total del período.<br><br>
<strong>Si usas formulario en tu web:</strong> Mira tu bandeja de email (cuántos emails de "nuevo mensaje" recibiste), tu CRM, o la plataforma de tu web (Wix, WordPress, etc.).<br><br>
<strong>Si te contactan por WhatsApp:</strong> Abre WhatsApp Business, entra en cada conversación y cuenta las que empezaron este mes con alguien nuevo.<br><br>
<strong>Si no tienes registro claro:</strong> Haz una estimación honesta. Cuenta llamadas nuevas + emails de consulta + mensajes nuevos. Si no puedes, empieza a apuntarlo esta semana.`,
    placeholder:'Ej: 40',
    bench:null,
    tip:'Si no tienes claro este número, ahí está el primer problema: lo que no se mide no se puede mejorar. Empieza esta semana con una simple hoja de cálculo.'
  },
  {
    id:2, key:'primer_contacto',
    icon:'⚡', name:'Primer contacto <24h',
    question:'¿A cuántos de esos leads contactaste o respondiste en menos de 24 horas?',
    desc:'El tiempo de respuesta lo cambia todo. Un lead que espera más de 24 horas ya está comparando con tu competencia.',
    where:`
<strong>Revisa tu historial de respuestas:</strong> Entra en tu email o WhatsApp y mira la diferencia de tiempo entre el mensaje del lead y tu respuesta. ¿Fue el mismo día? ¿Al día siguiente? ¿Más tarde?<br><br>
<strong>Si usas CRM:</strong> Busca el campo "Primera actividad" o "Primer contacto" y compáralo con la fecha de entrada del lead.<br><br>
<strong>Si atiendes por teléfono:</strong> ¿Cuántas llamadas perdidas devolviste el mismo día? Eso también cuenta.<br><br>
<strong>Truco para ser honesto:</strong> Si no recuerdas exactamente, piensa en cuántos leads te han llegado este mes y cuántos respondiste enseguida vs. los que "quedaron pendientes" y tardaste días. Esa proporción es tu realidad.`,
    placeholder:'Ej: 28',
    bench:0.80, benchLabel:'mínimo 80% en menos de 24h',
    tip:'Configura una respuesta automática en tu email o WhatsApp que diga "Hemos recibido tu consulta y te responderemos en menos de X horas". Solo eso ya mejora la percepción del cliente.'
  },
  {
    id:3, key:'segunda_llamada',
    icon:'🔄', name:'Segunda llamada',
    question:'¿A cuántos leads volviste a llamar o escribir cuando no respondieron al primer contacto?',
    desc:'Este es el punto donde más dinero se pierde en casi todos los negocios. El lead no responde, y nadie vuelve a intentarlo.',
    where:`
<strong>Revisa tus llamadas salientes:</strong> En el teléfono, filtra las llamadas del mes y busca contactos a los que hayas llamado más de una vez. ¿Cuántos son?<br><br>
<strong>Revisa tu WhatsApp o email:</strong> ¿Cuántas conversaciones tienen dos o más mensajes tuyos seguidos sin respuesta del cliente? Eso son los seguimientos que sí hiciste.<br><br>
<strong>CRM (si tienes uno):</strong> Cuenta las actividades de tipo "segundo intento" o "llamada de seguimiento".<br><br>
<strong>Si la respuesta es muy baja o cero:</strong> No te preocupes, es lo más habitual. La mayoría de equipos contacta una vez y si no hay respuesta, pasa al siguiente. Estás aquí precisamente para cambiarlo.`,
    placeholder:'Ej: 12',
    bench:0.70, benchLabel:'al menos 70% de los leads',
    tip:'La mayoría de las ventas no se cierran en el primer contacto. Con solo añadir un segundo intento de forma sistemática, muchos negocios ven crecer sus cierres un 20-30%.'
  },
  {
    id:4, key:'presupuesto',
    icon:'📄', name:'Presupuesto enviado',
    question:'¿A cuántos leads enviaste un presupuesto o propuesta formal?',
    desc:'Un presupuesto enviado es una señal muy clara: ese lead es real, tiene interés y está evaluando si contratarte. A partir de aquí, el seguimiento lo es todo.',
    where:`
<strong>Busca en tu email "Enviados":</strong> Filtra por palabras como "presupuesto", "propuesta", "cotización", "tarifa" o "precio" en el período del mes.<br><br>
<strong>Si usas herramientas de presupuestos</strong> (PandaDoc, Better Proposals, o incluso Word/PDF enviados por email): cuenta los documentos que mandaste.<br><br>
<strong>CRM:</strong> Etapa "Propuesta enviada" o "Presupuesto" creadas este mes.<br><br>
<strong>Si mandas precios de forma verbal o por WhatsApp:</strong> Cuenta esas conversaciones también. Cualquier momento en que le informaste del precio a un lead cuenta.<br><br>
<strong>Consejo:</strong> Si mandas precios sin documentar, empieza a enviarlos siempre por escrito. Los leads que tienen algo tangible cierran mucho más y te da un registro claro.`,
    placeholder:'Ej: 18',
    bench:0.60, benchLabel:'al menos 60% de los leads',
    tip:'Si llegas a muchos leads pero envías pocos presupuestos, el cuello de botella está en la cualificación o en la rapidez de respuesta, no en la oferta en sí.'
  },
  {
    id:5, key:'seguimiento_presupuesto',
    icon:'📞', name:'Seguimiento del presupuesto',
    question:'¿A cuántos les llamaste o escribiste para hacer seguimiento después de enviar el presupuesto?',
    desc:'El presupuesto llega, el cliente dice "lo miro", y... silencio. ¿Cuántas veces volviste a contactar para saber qué les pareció?',
    where:`
<strong>Sé totalmente honesto aquí — es el dato más importante:</strong><br><br>
De todos los presupuestos que enviaste, ¿a cuántos clientes llamaste o escribiste después para preguntar "¿has podido revisar la propuesta?" o "¿tienes alguna duda sobre lo que te envié?"<br><br>
<strong>Cómo buscarlo:</strong> En tu email o WhatsApp, busca conversaciones donde hubo un presupuesto enviado y tú volviste a escribir días después. Eso es un seguimiento.<br><br>
<strong>CRM:</strong> Actividades de "seguimiento de propuesta" registradas en el período.<br><br>
<strong>La respuesta más habitual es un número muy bajo.</strong> La mayoría de empresas manda el presupuesto y espera a que el cliente llame. El cliente también espera. Y la venta muere por ausencia, no por rechazo.`,
    placeholder:'Ej: 5',
    bench:0.80, benchLabel:'al menos 80% de los presupuestos',
    tip:'Una llamada o mensaje de seguimiento 48-72h después del presupuesto puede incrementar tu tasa de cierre entre un 20% y un 40%. Es la acción con el mejor ROI de todo tu proceso comercial.'
  },
  {
    id:6, key:'cerradas',
    icon:'✅', name:'Ventas cerradas',
    question:'¿Cuántos leads acabaron contratando tu servicio o comprando?',
    desc:'El resultado final del proceso. Cuántos de los leads que llegaron este mes se convirtieron en clientes de verdad.',

/* ═══ HELPERS ═══ */
function v(i)   { return S.data[i]?.v ?? 0; }
function p(i)   { return S.data[i]?.price ?? 0; }
function rate(i){ if(i===0||!v(i-1))return null; return Math.min(1, v(i)/v(i-1)); }
function fmt(n) { if(n===null||n===undefined||isNaN(n))return'—'; return Math.round(n).toLocaleString('es-ES'); }
function fmtE(n){ if(!n&&n!==0)return'—'; return '€'+Math.round(n).toLocaleString('es-ES'); }
function fmtP(n){ if(n===null||isNaN(n))return'—'; return (n*100).toFixed(1)+'%'; }
function hcls(r,b){ if(!b||r===null)return''; const x=r/b; return x>=.9?'g':x>=.6?'w':'b'; }
function hclr(r,b){ const c=hcls(r,b); return c==='g'?'var(--success)':c==='w'?'var(--warning)':c==='b'?'var(--danger)':'var(--accent)'; }

function revenue()    { return v(5)*p(5); }
function moneyLost()  {
  const seg=v(4), cer=v(5), pre=v(3), px=p(5);
  if(!seg||!cer||!px)return 0;
  const closeRate=cer/seg;
  const idealSeg=Math.round(pre*.80);
  const extra=Math.max(0,Math.round((idealSeg-seg)*closeRate));
  return extra*px;
}
function leakFollowup(){ return Math.max(0,Math.round(v(1)*.70)-v(2)); }
function leakPresup()  { return Math.max(0,Math.round(v(3)*.80)-v(4)); }

function simRev(pct){
  const l=v(0),pc=v(1),sl=v(2),pr=v(3),sg=v(4),ce=v(5),px=p(5);
  if(!l||!px)return null;
  const r1=l>0?pc/l:0, r2=pc>0?sl/pc:0, r3=sl>0?pr/sl:0, r4=pr>0?sg/pr:0, r5=sg>0?ce/sg:0;
  const nr2=Math.min(1,r2*(1+pct/100)), nr4=Math.min(1,r4*(1+pct/100));
  const ns=pc*nr2, np=ns*r3, nsg=np*nr4, nc=nsg*r5;
  return Math.round(nc*px);
}

      const origRate = origCurr / origPrev;

      if (!_rafPending) {

          updateSim();
        });

    }, 30); // 30ms debounce — smooth but not laggy

    const { vals, cerradas, revenue: simRevenue } = calcSim();

      const origN = Math.round(v(sp.idx));

      if (numEl) {

          numEl.innerHTML = '<span style="color:#fff">' + origN + '</span>';

      if (msgEl && sp.canImprove) {
        if (pct === 0) {
          msgEl.style.color = 'var(--text-muted)';
          msgEl.textContent = 'Arrastra para simular una mejora en este paso';
        } else if (gain <= 0) {
          msgEl.style.color = 'var(--text-muted)';
          msgEl.textContent = 'Ya estás al máximo en este paso, no hay margen de mejora.';
        } else {
          msgEl.style.color = 'var(--success)';
          const phrases = {
            1: 'Si mejoras un ' + pct + '% la velocidad de respuesta, pasarías de atender ' + origN + ' leads a ' + newN + ' — ' + gain + ' más entrando al proceso.',
            2: 'Con un ' + pct + '% más de insistencia en el seguimiento, recuperarías ' + gain + ' leads que ahora se enfrían sin segunda llamada.',
            3: 'Enviando presupuesto a un ' + pct + '% más de leads cualificados, llegarías a ' + newN + ' propuestas — ' + gain + ' oportunidades más de cerrar.',
            4: 'Haciendo seguimiento al ' + pct + '% más de presupuestos enviados, activarías ' + gain + ' conversaciones que ahora quedan en silencio.',
            5: 'Mejorando el cierre un ' + pct + '%, pasarías de ' + origN + ' a ' + newN + ' ventas cerradas este mes.',
          };
          msgEl.textContent = phrases[sp.idx] || ('Mejorarías este paso de ' + origN + ' a ' + newN + ' (+' + gain + ').');
        }
      }
    });
  }

  function buildFunnel() {
    const container = document.getElementById('funnelSim');
    if (!container) return;

    container.innerHTML = SIM_PHASES.map((sp, i) => {
      const origN = v(sp.idx);
      const isFixed = !sp.canImprove;

      return `
      <div id="fcard_${i}" style="
        background:rgba(255,255,255,.03);
        border:1px solid rgba(255,255,255,.07);
        border-radius:12px;
        padding:14px 16px;
        margin-bottom:10px;
      ">
        <!-- Header row -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${isFixed?'0':'12px'}">
          <div style="font-size:16px;font-weight:700;color:#ffffff">${sp.icon} ${sp.label}</div>
          <div id="fnum_${i}" style="font-size:17px;font-weight:800;color:#ffffff">
            ${fmt(origN)}
          </div>
        </div>

        ${isFixed ? '' : `
        <div id="track_${i}" style="position:relative;height:52px;cursor:pointer;display:flex;align-items:center;margin-bottom:10px;user-select:none;-webkit-user-select:none;">
          <div style="position:absolute;left:0;right:0;height:10px;background:rgba(255,255,255,.12);border-radius:5px;"></div>
          <div id="fill_${i}" style="position:absolute;left:0;height:10px;width:0%;background:var(--accent);border-radius:5px;"></div>
          <div id="thumb_${i}" style="position:absolute;left:0%;width:38px;height:38px;border-radius:50%;background:var(--accent);box-shadow:0 0 18px rgba(238,70,188,.9);border:3px solid rgba(255,255,255,.5);transform:translateX(-50%);pointer-events:none;"></div>
          <div id="pctlbl_${i}" style="position:absolute;right:4px;top:0;font-size:13px;font-weight:800;color:var(--accent);">+0%</div>
        </div>
        <div id="msg_${i}" style="font-size:15px;line-height:1.6;color:var(--text-muted);min-height:20px;font-weight:500;">Arrastra para simular una mejora en este paso</div>
        `}
      </div>`;
    }).join('');

    // Wire custom div sliders — works on iOS Safari, Android, desktop
    SIM_PHASES.forEach((sp, i) => {
      if (!sp.canImprove) return;
      const track  = document.getElementById('track_'  + i);
      const fill   = document.getElementById('fill_'   + i);
      const thumb  = document.getElementById('thumb_'  + i);
      const pctlbl = document.getElementById('pctlbl_' + i);
      if (!track) return;

      let dragging = false;
      let startX = 0, startY = 0;

      function applyVal(clientX) {
        const rect = track.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const val  = Math.round(pct * 100);
        improvements[i] = val;
        const pctStr = val + '%';
        fill.style.width  = pctStr;
        thumb.style.left  = pctStr;
        pctlbl.textContent = '+' + pctStr;
        scheduleUpdate();
      }

      // Desktop mouse
      track.addEventListener('mousedown', (e) => {
        e.preventDefault();
        applyVal(e.clientX);
        const onMove = (e2) => applyVal(e2.clientX);
        const onUp   = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          clearTimeout(_debounceTimer); updateSim();
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // Mobile touch — only block scroll once we confirm horizontal drag
      track.addEventListener('touchstart', (e) => {
        dragging = false;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });

      track.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - startX);
        const dy = Math.abs(e.touches[0].clientY - startY);
        if (!dragging) {
          // Only start drag if horizontal movement is dominant
          if (dx < 5 && dy < 5) return;
          if (dy > dx) return; // vertical scroll — let it pass
          dragging = true;
        }
        e.preventDefault(); // horizontal drag confirmed — block scroll
        applyVal(e.touches[0].clientX);
      }, { passive: false });

      track.addEventListener('touchend', () => {
        if (dragging) { clearTimeout(_debounceTimer); updateSim(); }
        dragging = false;
      }, { passive: true });
    });

    updateSim();
  }

  buildFunnel();
}
